<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        h1 {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        .inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        input[type="number"]::placeholder { color: rgba(255, 255, 255, 0.3); }

        input[type="number"]:focus {
            border-color: rgba(99, 179, 237, 0.6);
            background: rgba(255, 255, 255, 0.12);
        }

        /* Remove number input arrows */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
        input[type="number"] { -moz-appearance: textfield; }

        .ops {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s, box-shadow 0.2s;
            letter-spacing: 0.3px;
        }

        button:active { transform: scale(0.97); }

        .btn-add    { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #0a2e1a; }
        .btn-sub    { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
        .btn-mul    { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #0a1e2e; }
        .btn-div    { background: linear-gradient(135deg, #fa709a, #fee140); color: #2e0a1a; }

        button:hover { opacity: 0.88; box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

        .result-box {
            margin-top: 24px;
            min-height: 56px;
            padding: 16px 20px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.3s, background 0.3s, border-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-box.success {
            color: #43e97b;
            background: rgba(67, 233, 123, 0.08);
            border-color: rgba(67, 233, 123, 0.25);
        }

        .result-box.error {
            color: #f5576c;
            background: rgba(245, 87, 108, 0.08);
            border-color: rgba(245, 87, 108, 0.25);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Calculator</h1>
        <p class="subtitle">Enter two numbers and choose an operation</p>

        <div class="inputs">
            <input type="number" id="a" placeholder="First number">
            <input type="number" id="b" placeholder="Second number">
        </div>

        <div class="ops">
            <button class="btn-add" onclick="calculate('add')">+ Add</button>
            <button class="btn-sub" onclick="calculate('subtract')">− Subtract</button>
            <button class="btn-mul" onclick="calculate('multiply')">× Multiply</button>
            <button class="btn-div" onclick="calculate('divide')">÷ Divide</button>
        </div>

        <div class="result-box" id="result">Result will appear here</div>
    </div>

    <script>
        async function calculate(operation) {
            const a = parseFloat(document.getElementById('a').value);
            const b = parseFloat(document.getElementById('b').value);
            const resultEl = document.getElementById('result');

            if (isNaN(a) || isNaN(b)) {
                resultEl.className = 'result-box error';
                resultEl.innerText = 'Please enter valid numbers in both fields.';
                return;
            }

            try {
                const response = await fetch('/' + operation, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ a, b })
                });
                const data = await response.json();

                if (response.ok) {
                    resultEl.className = 'result-box success';
                    resultEl.innerText = data.result;
                } else {
                    resultEl.className = 'result-box error';
                    resultEl.innerText = data.error;
                }
            } catch (err) {
                resultEl.className = 'result-box error';
                resultEl.innerText = 'Network error: ' + err.message;
            }
        }
    </script>
</body>
</html>
